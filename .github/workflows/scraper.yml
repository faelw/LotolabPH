name: Scraper PCSO Diario

on:
  schedule:
    - cron: '30 6,9,13 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências (Playwright)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # A linha abaixo instala o navegador Chrome invisível no servidor
          playwright install chromium

      - name: Executar o Scraper
        run: python scraper_pcso_pro.py

      - name: Salvar e Enviar o novo JSON (Commit e Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          if [ -f "pcso_master_data.json" ]; then
            git add pcso_master_data.json
            git commit -m "Auto-update: Novos resultados da PCSO extraídos" || true
            git push
          else
            echo "ERRO: O arquivo pcso_master_data.json não foi gerado."
            exit 1
          fi
